<div>
  <ul>
    <li><strong class="yellow">path</strong> - display current directory.</li>
    <li><strong class="yellow">ls</strong> - show files in current directory.</li>
    <li><strong class="yellow">cat &lt;filename&gt;</strong> - display &lt;filename&gt; in window.
    <li><strong class="yellow">cd &lt;directory&gt;</strong> - move into &lt;directory&gt; or just `cd ..` to return to root.</li>
    <li><strong class="yellow">history</strong> - see your command history.</li>
    <li><strong class="yellow">clear</strong> - clear current window.</li>
  </ul>
</div>
